<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="nDfNlMk2wvPV-koGT7Ur1MandTe503qb1CQ0kJw6fdA" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5383957100145583" crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背景グラデーション - 便利ツール集</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #333333;
            /* 暗い背景でプレビューを引き立てる */
            color: #eeeeee;
            font-family: "MS PGothic", "MS Pゴシック", sans-serif;
            margin: 20px;
        }

        .container {
            width: 800px;
            margin: 0 auto;
            background-color: #d4d0c8;
            border: 2px outset #ffffff;
            color: #000;
            padding: 10px;
        }

        h1 {
            color: #ffffff;
            background-color: #804000;
            padding: 5px;
            font-size: 18px;
            text-align: center;
            margin: -10px -10px 10px -10px;
        }

        .preview-pane {
            width: 100%;
            height: 150px;
            border: 2px inset #ffffff;
            margin-bottom: 15px;
            background-color: #fff;
        }

        table.control-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        table.control-table td {
            border: 1px solid #808080;
            padding: 8px;
        }

        .label {
            background-color: #c0c0c0;
            font-weight: bold;
            width: 120px;
        }

        .color-inputs {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        textarea.code-area {
            width: 100%;
            height: 60px;
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            border: 2px inset #ffffff;
            padding: 5px;
            margin-top: 5px;
        }

        button {
            background-color: #d4d0c8;
            border: 2px outset #ffffff;
            padding: 3px 15px;
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
        }

        button:active {
            border: 2px inset #ffffff;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            border-top: 1px solid #808080;
            padding-top: 5px;
        }

        a {
            color: #0000ff;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎞 背景グラデーション (Gradient Gen)</h1>

        <div id="root"></div>

        <div class="footer">
            [ <a href="https://00portal.kotojisamadake-tool.workers.dev/">便利ツール集ポータルへ戻る</a> ]
        </div>
    </div>

    <script type="text/babel">
        const App = () => {
            const [color1, setColor1] = React.useState('#8000ff');
            const [color2, setColor2] = React.useState('#ff0080');
            const [angle, setAngle] = React.useState(135);

            const gradient = `linear-gradient(${angle}deg, ${color1}, ${color2})`;

            const copyToClipboard = () => {
                const css = `background: ${gradient};`;
                navigator.clipboard.writeText(css);
                alert("CSSをコピーしました！");
            };

            return (
                <div>
                    <div class="preview-pane" style={{ background: gradient }}></div>

                    <table class="control-table">
                        <tr>
                            <td class="label">開始カラー</td>
                            <td>
                                <div class="color-inputs">
                                    <input type="color" value={color1} onChange={(e) => setColor1(e.target.value)} />
                                    <input type="text" value={color1} style={{ width: '70px' }} readOnly />
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="label">終了カラー</td>
                            <td>
                                <div class="color-inputs">
                                    <input type="color" value={color2} onChange={(e) => setColor2(e.target.value)} />
                                    <input type="text" value={color2} style={{ width: '70px' }} readOnly />
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="label">角度 ({angle}度)</td>
                            <td>
                                <input type="range" min="0" max="360" value={angle} onChange={(e) => setAngle(e.target.value)} style={{ width: '200px' }} />
                                <button onClick={() => setAngle(135)} style={{ marginLeft: '10px' }}>リセット</button>
                            </td>
                        </tr>
                        <tr>
                            <td class="label">生成されたCSS</td>
                            <td>
                                <textarea class="code-area" value={`background: ${gradient};`} readOnly />
                                <div style={{ textAlign: 'right', marginTop: '5px' }}>
                                    <button onClick={copyToClipboard}>📋 CSSをコピー</button>
                                </div>
                            </td>
                        </tr>
                    </table>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- admax -->
    <script src="https://adm.shinobi.jp/s/5dfe8bfce49a43ffe78096b109972b5b"></script>
    <!-- admax -->
</body>

</html>
